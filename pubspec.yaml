name: template_app
description: "Template App"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # B
  background_downloader: ^9.5.4

  # E
  equatable: ^2.0.8

  # G
  get_it: ^9.2.1

  # L
  logger: ^2.7.0

  # O
  open_filex: ^4.7.0

  # P
  path_provider: ^2.1.5

  # U
  url_launcher: ^6.3.2

  # S
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  go_router_builder: ^4.3.0
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4

flutter_assets:
  assets_path:
    - assets/images/
    - assets/launcher/
  output_path: lib/core/constants/
  filename: assets.dart
  field_prefix:
  classname: Assets
  ignore_comments: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/launcher/
