name: template_app
description: "Template App"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # B
  bounce: ^1.0.2

  # C
  connectivity_plus: ^7.1.1
  cached_network_image: ^3.4.1

  # D
  dio: ^5.9.2

  # E
  equatable: ^2.0.8

  # F
  flutter_bloc: ^9.1.1
  file_picker: ^11.0.2
  flutter_local_notifications: ^21.0.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # G
  get_it: ^9.2.1
  geocoding: ^4.0.0
  go_router: ^16.2.0
  geolocator: ^14.0.2

  # H
  hydrated_bloc: ^11.0.0

  # I
  intl: ^0.20.2
  image_picker: ^1.2.2

  # L
  logger: ^2.7.0

  # P
  path_provider: ^2.1.5
  pretty_dio_logger: ^1.4.0
  permission_handler: ^12.0.1

  # S
  shimmer: ^3.0.0
  socket_io_client: ^3.1.4
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  go_router_builder: ^4.3.0
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4

flutter_assets:
  assets_path:
    - assets/images/
  output_path: lib/core/constants/
  filename: assets.dart
  field_prefix:
  classname: Assets
  ignore_comments: true

flutter:
  uses-material-design: true
